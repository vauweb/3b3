<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
  </defs>

  <!-- head (skin) -->
  <circle cx="32" cy="32" r="29" fill="#f2d6c0"/>

  <!-- dark cap covering top of head (down to visor, no skin above visor) -->
  <path d="M 4.8 22 A 29 29 0 0 1 59.2 22 Z" fill="#0a5a66"/>
  <path d="M 4.8 22 A 29 29 0 0 1 59.2 22" fill="none" stroke="#00f0ff" stroke-width="1.6" opacity="0.6"/>

  <!-- cyber visor -->
  <rect x="5" y="22" width="54" height="13" rx="4" fill="#06141a"/>
  <rect x="5" y="22" width="54" height="13" rx="4" fill="#00f0ff" opacity="0.5" filter="url(#glow)"/>
  <rect x="9" y="26" width="46" height="5" rx="2.5" fill="#cdfaff"/>

  <!-- neon head outline -->
  <circle cx="32" cy="32" r="29" fill="none" stroke="#00f0ff" stroke-width="2.4" filter="url(#glow)"/>
  <circle cx="32" cy="32" r="29" fill="none" stroke="#a6f4ff" stroke-width="1.1"/>
</svg>
